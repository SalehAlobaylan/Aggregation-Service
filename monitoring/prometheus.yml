# Prometheus configuration for Wahb Aggregation Service
global:
  scrape_interval: 15s
  evaluation_interval: 15s

remote_write:
  - url: https://prometheus-prod-53-prod-me-central-1.grafana.net/api/prom/push
    basic_auth:
      username: 3006974
      password_file: /etc/prometheus/grafana-cloud-token

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # Aggregation Service metrics
  - job_name: 'aggregation-service'
    static_configs:
      - targets: ['aggregation:5002']
    metrics_path: /metrics
    scrape_interval: 10s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
